databaseChangeLog:

  - changeSet:
      id: create-order-announcement-table
      author: order-ms
      changes:

        - createTable:
            tableName: order_announcement
            columns:

              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: order_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: announcement_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp