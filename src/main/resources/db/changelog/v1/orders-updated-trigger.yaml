databaseChangeLog:

  - changeSet:
      id: 2026-04-20-02-orders-updated-at-trigger
      author: order-ms

      changes:

        - sql:
            splitStatements: false
            stripComments: true
            sql: |

              CREATE OR REPLACE FUNCTION set_updated_at()
              RETURNS TRIGGER AS $$
              BEGIN
                 NEW.updated_at = NOW();
                 RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              CREATE TRIGGER trg_orders_updated_at
              BEFORE UPDATE ON orders
              FOR EACH ROW
              EXECUTE FUNCTION set_updated_at();