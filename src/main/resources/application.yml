spring:
  application:
    name: order-ms
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
    hikari:
      schema: orders
  profiles:
    active:
      - kafka

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: orders
    database-change-log-table: ORDER_DBCHANGELOG
    database-change-log-lock-table: ORDER_DBCHANGELOGLOCK


  redis: localhost

  sleuth:
    sampler:
      probability: 1.0

  zipkin:
    base-url: http://localhost:9411/api/v2/spans
    sender:
      type: web
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  data:
    redis:
      post: 6379

server:
  port: 8081
  servlet:
    context-path: /order-ms/api
